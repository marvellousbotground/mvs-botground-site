<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Update Logs | Marvellous BOTground</title>
<meta name="theme-color" content="#0b0d12">

<meta
name="description"
content="Marvellous BOTground - Community Discord Bot for Marvellous Smackdown. Profiles, Featured Characters, PvP, Updates and more.">

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    background:
        radial-gradient(circle at top, rgba(0,255,136,.18), transparent 32%),
        radial-gradient(circle at bottom right, rgba(88,101,242,.16), transparent 30%),
        linear-gradient(180deg,#171a21 0%,#0b0d12 100%);
}

.page{
    max-width:1180px;
    margin:60px auto;
    padding:0 25px;
    display:grid;
    grid-template-columns:1fr 280px;
    gap:26px;
}

.container,
.sidebar{
    background:rgba(23,26,33,.94);
    border:1px solid rgba(0,255,136,.14);
    border-radius:20px;
    box-shadow:0 0 28px rgba(0,0,0,.35);
}

.container{
    padding:42px;
}

.sidebar{
    height:max-content;
    position:sticky;
    top:30px;
    padding:24px;
}

.back{
    display:inline-block;
    color:#00ff88;
    text-decoration:none;
    margin-bottom:26px;
    font-weight:bold;
}

.back:hover{
    text-decoration:underline;
}

h1{
    text-align:center;
    font-size:42px;
    margin:0 0 10px;
}

.subtitle{
    text-align:center;
    color:#c2c7d1;
    margin-bottom:38px;
}

.update{
    background:#1d2230;
    border:1px solid rgba(255,255,255,.06);
    border-left:5px solid #2d3548;
    border-radius:18px;
    padding:28px;
    margin-bottom:28px;
    transition:.25s;
}

.update.latest{
    border-left-color:#00ff88;
    box-shadow:0 0 24px rgba(0,255,136,.22);
}

.update:hover{
    transform:translateY(-3px);
    border-color:rgba(0,255,136,.28);
}

.version{
    color:#00ff88;
    font-size:25px;
    font-weight:900;
    margin-bottom:6px;
}

.update-title{
    font-size:18px;
    color:white;
    margin-bottom:8px;
}

.date{
    color:#8f95a3;
    margin-bottom:20px;
}

.category{
    margin-top:22px;
}

.category h3{
    margin:0 0 10px;
    color:#00ff88;
}

ul{
    margin:0;
    padding-left:22px;
    line-height:1.85;
    color:#e5e7eb;
}

.footer{
    margin-top:40px;
    text-align:center;
    color:#8f95a3;
    font-size:14px;
}

.sidebar h3{
    margin-top:0;
    text-align:center;
    margin-bottom:18px;
}

.sidebar a{
    display:block;
    text-decoration:none;
    color:white;
    background:#232734;
    padding:13px 15px;
    border-radius:12px;
    margin-bottom:10px;
    font-weight:bold;
    transition:.22s;
}

.sidebar a span{
    display:block;
    color:#9aa3b8;
    font-size:12px;
    margin-top:4px;
}

.sidebar a:hover,
.sidebar a.active{
    background:#00ff88;
    color:#07110c;
    box-shadow:0 0 18px rgba(0,255,136,.48);
    transform:translateY(-2px);
}

.sidebar a:hover span,
.sidebar a.active span{
    color:#07110c;
}

.empty{
    color:#c2c7d1;
    text-align:center;
    padding:40px 0;
}

@media(max-width:900px){
    .page{
        grid-template-columns:1fr;
        margin:30px auto;
    }

    .sidebar{
        position:static;
        order:-1;
    }

    .container{
        padding:28px;
    }

    h1{
        font-size:34px;
    }
}

@media(max-width:600px){
    .page{
        padding:0 14px;
    }

    .container{
        padding:22px;
    }

    .update{
        padding:20px;
    }

    .version{
        font-size:21px;
    }
}
</style>
</head>

<body>

<div class="page">

<div class="container">

<a class="back" href="index.html">← Back Home</a>

<h1>📝 Update Logs</h1>

<p class="subtitle">
Marvellous BOTground official update history.
</p>

<div id="updatesContainer">
    <p class="empty">Loading updates...</p>
</div>

<div class="footer" id="footer">
Last updated automatically
</div>

</div>

<div class="sidebar">
<h3>Updates</h3>
<div id="updateList"></div>
</div>

</div>

<script>
const API = "https://verify.marvellousbot.win/api/updates";

function escapeHTML(text){
    return String(text || "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
}

function makeList(items){
    if(!Array.isArray(items) || items.length === 0){
        return "";
    }

    return `
        <ul>
            ${items.map(item => `<li>${escapeHTML(item)}</li>`).join("")}
        </ul>
    `;
}

function renderCategory(title, items){
    if(!Array.isArray(items) || items.length === 0){
        return "";
    }

    return `
        <div class="category">
            <h3>${title}</h3>
            ${makeList(items)}
        </div>
    `;
}

async function loadUpdates(){
    const container = document.getElementById("updatesContainer");
    const list = document.getElementById("updateList");
    const footer = document.getElementById("footer");

    try{
        const res = await fetch(API);
        const updates = await res.json();

        if(!Array.isArray(updates) || updates.length === 0){
            container.innerHTML = `<p class="empty">No updates registered yet.</p>`;
            list.innerHTML = "";
            return;
        }

        container.innerHTML = updates.map((update, index) => `
            <div
                class="update ${index === 0 ? "latest" : ""}"
                id="${escapeHTML(update.id)}"
            >
                <div class="version">${escapeHTML(update.version)}</div>
                <div class="update-title">${escapeHTML(update.title)}</div>
                <div class="date">${escapeHTML(update.date)}</div>

                ${renderCategory("Added", update.added)}
                ${renderCategory("Improved", update.improved)}
                ${renderCategory("Fixed", update.fixed)}
            </div>
        `).join("");

        list.innerHTML = updates.map((update, index) => `
            <a
                href="#${escapeHTML(update.id)}"
                data-target="${escapeHTML(update.id)}"
                class="${index === 0 ? "active" : ""}"
            >
                ${escapeHTML(update.version)}
                <span>${escapeHTML(update.title)}</span>
            </a>
        `).join("");

        footer.textContent =
            `Last updated: ${updates[0].date}`;

        observeActiveUpdates();

    }catch(error){
        console.error(error);
        container.innerHTML = `<p class="empty">Failed to load updates.</p>`;
    }
}

function observeActiveUpdates(){
    const links = document.querySelectorAll(".sidebar a");
    const updates = document.querySelectorAll(".update");

    const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
            if(entry.isIntersecting){
                links.forEach(link => {
                    link.classList.toggle(
                        "active",
                        link.dataset.target === entry.target.id
                    );
                });
            }
        });
    },{
        root:null,
        threshold:0.45
    });

    updates.forEach(update => observer.observe(update));
}

loadUpdates();
</script>

</body>
</html>
